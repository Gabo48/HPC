services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - hpc-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit max_message_size 536870912 vm_memory_high_watermark 0.85

  postgres:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hpc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - hpc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ray-head:
    build:
      context: .
      dockerfile: Dockerfile.processor
    command: ray start --head --port=6379 --ray-client-server-port=10001 --dashboard-host=0.0.0.0 --num-cpus=0 --block
    shm_size: '6gb'
    ports:
      - "8265:8265"
    env_file: .env
    networks:
      - hpc-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  ray-worker:
    build:
      context: .
      dockerfile: Dockerfile.processor
    command: ray start --address=ray-head:6379 --num-cpus=${RAY_WORKER_CPUS:-1} --block
    shm_size: '6gb'
    env_file: .env
    networks:
      - hpc-net
    depends_on:
      ray-head:
        condition: service_started
    deploy:
      replicas: 2

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "0.0.0.0:8000:8000"
    env_file: .env
    networks:
      - hpc-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

  upload-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      HPC_BACKEND: ${HPC_BACKEND:-ray}
      CHUNK_SIZE_KB: ${CHUNK_SIZE_KB:-1024}
      RAY_WORKERS: ${RAY_WORKERS:-}
      RAY_CHUNK_BATCH_SIZE: ${RAY_CHUNK_BATCH_SIZE:-16}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
    networks:
      - hpc-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    restart: "no"
    shm_size: '6gb'
    env_file: .env
    environment:
      HPC_BACKEND: ${HPC_BACKEND:-ray}
      BENCHMARK_MODE: ${BENCHMARK_MODE:-processor}
      BENCHMARK_BACKENDS: ${BENCHMARK_BACKENDS:-sequential,numpy,cython,ray}
      BENCHMARK_DATASETS: ${BENCHMARK_DATASETS:-random,repeated,modified,mixed}
      BENCHMARK_FILE_SIZES_MB: ${BENCHMARK_FILE_SIZES_MB:-10,100,500}
      BENCHMARK_CHUNK_SIZES_KB: ${BENCHMARK_CHUNK_SIZES_KB:-256,1024,4096}
      BENCHMARK_RUNS: ${BENCHMARK_RUNS:-5}
      BENCHMARK_INCLUDE_1GB: ${BENCHMARK_INCLUDE_1GB:-false}
      RAY_WORKERS: ${RAY_WORKERS:-}
      UPLOAD_WORKERS: ${UPLOAD_WORKERS:-1}
      RAY_CHUNK_BATCH_SIZE: ${RAY_CHUNK_BATCH_SIZE:-16}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
    profiles: ["benchmark"]
    volumes:
      - ./results:/results
    networks:
      - hpc-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  hpc-net:

volumes:
  postgres_data:
  minio_data:
